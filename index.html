<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tennis King</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, sans-serif;
}

body{
    background:#000;
    background-image:
    linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
    background-size:30px 30px;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    color:#fff;
}

.container{
    width:100%;
    max-width:420px;
    text-align:center;
    padding:25px;
    border-radius:28px;
    background:radial-gradient(circle at top, #1f1f00 0%, #000 75%);
    box-shadow:0 0 30px rgba(204,255,0,0.08);
}

/* PROFILE */

.profile-box{
    position:relative;
    margin-bottom:18px;
}

.profile-img{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid #d4ff00;
    box-shadow:
    0 0 15px #d4ff00,
    0 0 40px rgba(212,255,0,0.5);
}

/* TITLE */

h1{
    color:#ffcc00;
    font-size:38px;
    font-weight:800;
    margin-bottom:10px;
}

.members{
    color:#ffcc00;
    font-weight:700;
    margin-bottom:18px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
}

/* BADGES */

.badges{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-bottom:28px;
}

.badge{
    padding:7px 14px;
    border-radius:30px;
    font-size:12px;
    font-weight:700;
    background:#111;
}

.yellow{
    border:1px solid #ffcc00;
    color:#ffcc00;
}

.red{
    border:1px solid #ff3b3b;
    color:#ff3b3b;
}

/* STATS */

.stats{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:12px;
    margin-bottom:30px;
}

.card{
    background:#0d0d0d;
    border:1px solid #222;
    border-radius:14px;
    padding:18px 10px;
}

.card:nth-child(2){
    border-color:#ff3b3b;
}

.number{
    display:block;
    font-size:24px;
    font-weight:800;
    margin-bottom:5px;
}

.label{
    color:#888;
    font-size:12px;
}

.gold{
    color:#ffcc00;
}

.redtxt{
    color:#ff4444;
}

/* TELEGRAM BUTTON */

@keyframes pulse{
    0%{
        transform:scale(1);
        box-shadow:0 0 0 rgba(0,0,0,0);
    }

    50%{
        transform:scale(1.05);
        box-shadow:0 0 30px rgba(0,255,0,0.3);
    }

    100%{
        transform:scale(1);
        box-shadow:0 0 0 rgba(0,0,0,0);
    }
}

.telegram-btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;
    width:100%;
    padding:18px;
    border-radius:16px;
    text-decoration:none;
    color:#fff;
    font-size:24px;
    font-weight:800;
    margin-bottom:35px;

    background:linear-gradient(90deg,#2e7d32,#d32f2f);

    animation:pulse 1.5s infinite;
}

/* FEATURES */

.features{
    border:1px solid #333;
    border-radius:18px;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    padding:20px 10px;
    margin-bottom:35px;
    background:rgba(255,255,255,0.02);
}

.feature i{
    font-size:24px;
    margin-bottom:10px;
}

.feature span{
    display:block;
    font-size:11px;
    color:#aaa;
}

.green{
    color:#4caf50;
}

.yellow2{
    color:#ffcc00;
}

.red2{
    color:#ff4444;
}

/* FOOTER */

.footer{
    color:#666;
    font-size:12px;
    line-height:1.8;
}
</style>
</head>

<body>

<div class="container">

    <!-- PROFILE IMAGE -->
    <div class="profile-box">
        <img 
        src="http://ttrder.almoeezads.in/wp-content/uploads/2026/05/photo_2026-05-19_12-00-06.jpg" 
        class="profile-img"
        alt="Profile">
    </div>

    <!-- TITLE -->
    <h1> Cricket Pandit</h1>

    <!-- MEMBERS -->
    <div class="members">
        <i class="fas fa-users"></i>
        30K+ Active Members
    </div>

    <!-- BADGES -->
    <div class="badges">
        <div class="badge yellow">🏆 Elite Analyst</div>
        <div class="badge red">⚡ Live Updates</div>
    </div>

    <!-- STATS -->
    <div class="stats">

        <div class="card">
            <span class="number gold">25,892</span>
            <span class="label">Match Tips</span>
        </div>

        <div class="card">
            <span class="number redtxt">99%</span>
            <span class="label">Win Rate</span>
        </div>

        <div class="card">
            <span class="number gold">4.9★</span>
            <span class="label">Rating</span>
        </div>

    </div>

    <!-- TELEGRAM BUTTON -->
    <a href="https://t.me/+cIv8zTrHkKBlZThl" class="telegram-btn">
        <i class="fab fa-telegram-plane"></i>
        Join Telegram Channel
    </a>

    <!-- FEATURES -->
    <div class="features">

        <div class="feature">
            <i class="far fa-check-circle green"></i>
            <span>Verified</span>
        </div>

        <div class="feature">
            <i class="fas fa-lock yellow2"></i>
            <span>Secure</span>
        </div>

        <div class="feature">
            <i class="fas fa-chart-line red2"></i>
            <span>Profitable</span>
        </div>

        <div class="feature">
            <i class="far fa-star yellow2"></i>
            <span>Top Rated</span>
        </div>

    </div>

    <!-- FOOTER -->
    <div class="footer">
        © 2025 Toss Match Pass. All rights reserved.<br>
        Professional Tennis Analysis & Predictions
    </div>

</div>

</body>
</html>
